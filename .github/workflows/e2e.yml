name: E2E Tests

on:
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root deps
        run: npm ci

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run backend migrations
        run: npm run migrate
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: Seed test DB
        run: npm run seed:test
        working-directory: backend
        env:
          TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      - name: Build backend
        run: npm run build
        working-directory: backend

      - name: Build frontend
        # VITE_API_URL is baked into the bundle so the browser calls the
        # backend directly (cross-origin). preview.proxy is kept as backup.
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:3001/api

      - name: Start backend
        run: node dist/server.js > /tmp/backend.log 2>&1 &
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NODE_ENV: production
          PORT: 3001
          # Allow the E2E frontend origin (direct cross-origin requests when
          # the browser calls localhost:3001 directly from localhost:4173)
          CORS_ORIGIN: http://localhost:4173

      - name: Start frontend preview
        run: npm run preview -- --port 4173 --host 0.0.0.0 &
        working-directory: frontend

      - name: Wait for services
        run: |
          npx wait-on http://localhost:3001/api/health http://localhost:4173 --timeout 60000 || {
            echo "=== Backend startup log ===" && cat /tmp/backend.log
            exit 1
          }

      - name: Run Playwright tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173

      - name: Dump backend log on failure
        if: failure()
        run: cat /tmp/backend.log || echo "(no backend log)"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
